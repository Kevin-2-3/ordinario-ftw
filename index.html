<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <main class="login">
        <section class="seccion-login">
            <div class="formulario-login"> 
                <img src="recursos/user-icono.png" height="150" width="150" alt="icono de usuario"> 
                <h2>Iniciar Sesión</h2>
                <div class="campo-login">
                    <label for="username"><b>Nombre de usuario</b></label>
                    <input type="text" id="username" placeholder="Introduce tu nombre" required>
                </div>
                <div class="campo-login">
                    <label for="password"><b>Contraseña</b></label>
                    <input type="password" id="password" placeholder="Introduce tu contraseña" required>
                </div>
                <button type="button" onclick="verificarLogin()" class="boton-comprar">Login</button>
                <p id="mensajeError" class="mensaje-error"></p> 
            </div>
        </section>
    </main>
    <script src="../js/script.js"></script>
</body>
</html>
