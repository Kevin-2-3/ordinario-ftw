<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lnyx Mobile</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div id="barraNavegacion"></div>

    <main>
        <section class="principal">
            <div>
                <h1>Lo importante, eres tú</h1>
                <br>
                <p>Descubre nuestro nuevo LX1</p>
                <button onclick="window.location.href='telefono-principal.html'" id="boton-comprarPrincipal" class="boton-comprar">Comprar ahora</button>
            </div>
        </section>

        <section class="destacados">
            <h2>Nuestros Teléfonos Destacados</h2>
            <div class="galeria-telefonos">
                <article class="telefono-item">
                    <img src="../recursos/L100.png" alt="Modelo L100">
                    <h3>L100</h3>
                    <p>Increíble pantalla y cámara</p>
                    <button class="boton-comprar">Ver Detalles</button>
                </article>
                <article class="telefono-item">
                    <img src="../recursos/L200U.png" alt="Modelo L200U">
                    <h3>L200U</h3>
                    <p>Rendimiento excepcional</p>
                    <button class="boton-comprar">Ver Detalles</button>
                </article>
                <article class="telefono-item">
                    <img src="../recursos/LX2u.png" alt="Modelo LX2u">
                    <h3>LX2 Ultra Pro Plus Magic Mas etc etc..</h3>
                    <p>El mejor de su gama</p>
                    <button class="boton-comprar">Ver Detalles</button>
                </article>
            </div>
        </section>
    </main>

    <div id="piePagina"></div>
    <script src="../js/script.js"></script>
</body>
</html>
